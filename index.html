<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Inventario</title>
    <link
      rel="stylesheet"
      href="styles.css"
    />
  </head>
  <body>
    <header>
      <h1
        id="encabezado"
        class="encabezado"
      >
        Inventario
      </h1>
      <nav>
        <ul>
          <li class="nav-item">
            <a
              class="nav-link"
              href="#encabezado"
              >Home</a
            >
          </li>
          <li class="nav-item">
            <a
              class="nav-link"
              href="#alta"
              >Alta</a
            >
          </li>
          <li class="nav-item">
            <a
              class="nav-link"
              href="#consulta"
              >Consulta</a
            >
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section id="alta">
        <h2
          class="titulo"
          id="titulo"
        >
          Alta de productos
        </h2>
        <form
          id="formulario"
          action="submit"
          method="post"
        >
          <label
            class="form-label"
            for="producto"
            >Producto:</label
          >
          <input
            class="input"
            type="text"
            id="producto"
            name="producto"
            placeholder="Ingrese el nombre del producto"
            required
          />

          <label
            class="form-label"
            for="cantidad"
            >cantidad:</label
          >
          <input
            class="input"
            type="number"
            id="cantidad"
            name="cantidad"
            placeholder="Ingrese la cantidad"
            required
          />

          <label
            class="form-label"
            for="precio"
            >Precio:</label
          >
          <input
            class="input"
            type="number"
            id="precio"
            name="precio"
            placeholder="Ingrese el precio"
            required
          />
          <label
            class="form-label"
            for="categoria"
            >Categoria:</label
          >
          <select
            class="input"
            class="slc-cat"
            id="categoria"
            name="categoria"
            required
          >
            <option value="">Seleccione una categoria</option>
          </select>
          <label
            class="form-label"
            for="fecha_expiracion"
            >Fecha de Expiracion:</label
          >
          <input
            class="input"
            class="slc-cat"
            type="date"
            id="fecha_expiracion"
            name="fecha_expiracion"
          />

          <input
            id="agregar"
            type="submit"
            value="Agregar"
          />
        </form>
      </section>
      <section id="consulta">
        <h2 class="titulo">Consulta de productos</h2>
        <table class="tabla">
          <thead>
            <tr class="tabla-header">
              <th>Nombre</th>
              <th>Cantidad</th>
              <th>Precio</th>
              <th>Categoria</th>
              <th>Fecha de Expiracion</th>
              <th>Modificar</th>
              <th>Eliminar</th>
            </tr>
          </thead>
          <tbody
            class="tabla-body"
            id="tabla-productos"
          ></tbody>
        </table>

        <dialog>
          <form
            method="dialog"
            class="dialog-form"
          >
            <h3>Modificar Producto</h3>
            <label
              for="mproducto"
              class="form-label"
              >Producto:</label
            >
            <input
              type="text"
              id="mproducto"
              name="modificar_producto"
              class="input"
              required
            />
            <label
              for="mcantidad"
              class="form-label"
              >Cantidad:</label
            >
            <input
              type="number"
              id="mcantidad"
              name="modificar_cantidad"
              class="input"
              required
            />
            <label
              for="mprecio"
              class="form-label"
              >Precio:</label
            >
            <input
              type="number"
              id="mprecio"
              name="modificar_precio"
              class="input"
              required
            />
            <label
              for="mcategoria"
              class="form-label"
              >Categoria:</label
            >
            <select
              id="mcategoria"
              name="modificar_categoria"
              class="input"
              class="slc-cat"
              required
            >
              <option value="">Seleccione una categoria</option>
            </select>
            <label
              for="mfecha_expiracion"
              class="form-label"
              >Fecha de Expiracion:</label
            >
            <input
              type="date"
              id="mfecha_expiracion"
              name="mfecha_expiracion"
              class="input"
            />
            <div class="dialog-buttons">
              <button
                type="submit"
                id="modificar"
              >
                Modificar
              </button>
              <button
                type="button"
                id="cancelar"
              >
                Cancelar
              </button>
            </div>
          </form>
        </dialog>
      </section>
    </main>
    <script
      src="src/main.js"
      type="module"
    ></script>
  </body>
</html>
